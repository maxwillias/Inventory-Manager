services:

  app:
    build:
      context: ./backend
    container_name: estoque-app
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: estoque-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mysql:
    image: mysql:8.4
    container_name: estoque-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: estoque
      MYSQL_USER: estoque
      MYSQL_PASSWORD: estoque123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    container_name: estoque-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  composer:
    image: composer:latest
    working_dir: /app
    volumes:
      - ./backend:/app

volumes:
  mysql_data: